
server:
  port: 8081

spring:
  application:
    name: ecom-inventory-service
  datasource:
    url: ${DB_URL:jdbc:h2:mem:inventorydb}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
